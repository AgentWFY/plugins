name: Publish Plugin
description: Submit a plugin to the AgentWFY registry
title: "Publish: "
labels: ["publish"]
body:
  - type: input
    id: download_url
    attributes:
      label: Download URL
      description: URL to your .plugins.awfy package (GitHub Release asset)
      placeholder: https://github.com/you/your-plugin/releases/latest/download/plugin.plugins.awfy
    validations:
      required: true
  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      description: What does this plugin add?
      options:
        - label: providers
        - label: functions
